# ── Gateway (Local Only) ─────────────────────────────────────────────
# No tunnel, no relay. Access at http://localhost:<port>.

# Upstream MCP server
mcp = "http://localhost:9000/mcp"

# Widget source: URL (dev server) or file path (static build)
widgets = "http://localhost:4444"

# Local proxy port (default: 3000)
port = 3000

# Tunnel is off by default — this is proxy-only mode.
# To enable tunnel, add: [tunnel] enabled = true

[csp]
# mode = "extend"  # "extend" (default) or "override"
# domains = ["https://media.mcpr.app", "https://api.dictionaryapi.dev"]
