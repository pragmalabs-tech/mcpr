# ── Gateway + Tunnel ─────────────────────────────────────────────────
# Proxy traffic through a relay server.
# Widgets and MCP are served via the public tunnel URL.

# Upstream MCP server
mcp = "http://localhost:9000/mcp"

# Widget source: URL (dev server) or file path (static build)
widgets = "http://localhost:4444"

# Local proxy port (optional in tunnel mode — picks a random port if omitted)
# port = 3000

[tunnel]
# Enable tunnel for a public URL (default: false, proxy-only mode)
enabled = true
# Relay server to connect to
relay_url = "https://tunnel.mcpr.app"

# Fixed subdomain (optional — derived from token if omitted)
# subdomain = "03e48f685b45"

# Persistent tunnel identity (auto-saved on first run if omitted)
# token = "90c74def-8fdc-4922-8702-44bc5cabf830"

[csp]
# mode = "extend"  # "extend" (default) or "override"
# domains = ["https://media.mcpr.app", "https://api.dictionaryapi.dev"]
