# ── Relay Server ─────────────────────────────────────────────────────
# Run the tunnel relay that developers connect to.
# Start with: mcpr start --foreground --relay
#
# This is typically deployed on a VPS with a wildcard domain
# (e.g. *.tunnel.mcpr.app) behind nginx/Caddy for TLS.

mode = "relay"
port = 8080

[relay]
# Base domain for tunnel subdomains (e.g. <subdomain>.tunnel.mcpr.app)
domain = "tunnel.mcpr.app"

# ── Auth: pick ONE of the options below (or none for open mode) ─────

# Option 1: Static tokens — simple, no external service needed.
# Each token has a list of allowed subdomain patterns.
# Patterns support glob wildcards: "myapp-*", "*-preview", "pr-*-acme"
#
# [[relay.tokens]]
# token = "mcpr_abc123"
# subdomains = ["myapp", "myapp-*"]
#
# [[relay.tokens]]
# token = "mcpr_def456"
# subdomains = ["other-app", "other-app-*"]

# Option 2: External auth provider — for dynamic token management.
# See docs/AUTH_PROVIDER.md for the API contract.
#
# auth_provider = "https://auth.mcpr.app"
# auth_provider_secret = "your-shared-secret-here"
