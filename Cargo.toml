[package]
name = "mcpr"
version = "0.1.0"
edition = "2024"
license = "Apache-2.0"

[dependencies]
axum = { version = "0.8", features = ["ws"] }
tokio = { version = "1", features = ["macros", "rt-multi-thread", "signal", "io-util", "sync"] }
clap = { version = "4", features = ["derive", "env"] }
reqwest = { version = "0.12", default-features = false, features = ["json", "stream", "rustls-tls"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tower-http = { version = "0.6", features = ["cors"] }
colored = "3"
chrono = "0.4"
ratatui = "0.29"
crossterm = "0.28"
tokio-tungstenite = { version = "0.26", features = ["connect", "rustls-tls-webpki-roots"] }
sha2 = "0.10"
base64 = "0.22"
uuid = { version = "1", features = ["v4"] }
futures-util = "0.3"
http-body-util = "0.1"
toml = "0.8"
include_dir = "0.7.4"
dashmap = "6"
url = "2"

[dev-dependencies]
tempfile = "3"
