# Sidecar pattern: mcpr in front of an MCP server, both on the same network.
# Clients talk to mcpr (port 3000); mcpr forwards to the upstream by service name.
# Replace `your-mcp-server` with your image and adjust `port` / `upstream` to match.

services:
  mcp-server:
    image: your-mcp-server:latest
    expose:
      - "9000"

  mcpr:
    image: ghcr.io/pragmalabs-tech/mcpr:latest
    restart: unless-stopped
    depends_on:
      - mcp-server
    ports:
      - "3000:3000"
    volumes:
      - ./mcpr.toml:/etc/mcpr/mcpr.toml:ro
      - mcpr-state:/var/lib/mcpr

volumes:
  mcpr-state:

# mcpr.toml (alongside this file):
#   mcp = "http://mcp-server:9000"
#   port = 3000
